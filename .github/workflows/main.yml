name: CI/CD Pipeline

on:
  push:
    branches: [ main, development, release ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pdoc

      - name: Run unit tests
        run: pytest test_calculator.py -v

      - name: Print environment info
        run: |
          echo "Ветка: $GITHUB_REF_NAME"
          echo "Коммит: $GITHUB_SHA"
          echo "Запустил: $GITHUB_ACTOR"
          echo "Версия Python: $(python --version)"

      - name: Generate HTML documentation
        run: |
          pdoc calculator --output-dir docs
          echo "Документация сгенерирована"
          ls -la docs/

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    name: Deploy Documentation
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
