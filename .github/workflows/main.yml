# GitHub Actions — это встроенная система автоматизации GitHub.
# Когда запускаем код, GitHub читает этот файл и запускает
# виртуальную машину (ubuntu), которая выполняет все шаги ниже.

name: CI/CD Pipeline  # Это имя будет отображаться во вкладке Actions

# ТРИГГЕРЫ — когда запускать pipeline
on:
  push:
    branches: [ main, development, release ]
    # Запускается автоматически когда кто-то делает git push
    # в одну из этих веток. Например:
    # - запушил фичу в development → CI запустился
    # - смержил PR в main → CI запустился снова
  pull_request:
    branches: [ main ]
    # Запускается когда создаётся Pull Request с целью влить в main.
    # Это защита: нельзя смержить сломанный код в main,
    # сначала должны пройти все тесты.

# JOBS — набор задач которые будут выполнены
# Каждый job запускается на отдельной чистой виртуальной машине
jobs:

  # JOB 1: Тестирование
  # Устанавливает Python, зависимости и запускает тесты
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    # ubuntu-latest — GitHub поднимает чистую виртуальную машину
    # с Ubuntu Linux. На ней нет ничего лишнего — только базовая ОС.
    # Это гарантирует что тесты проходят не только "у тебя на компе".

    steps:
    # Шаги выполняются строго по порядку.
    # Если один шаг упал — следующие не запускаются.

      # Клонирование репозитория
      - name: Checkout repository
        uses: actions/checkout@v4
        # "uses" означает — использовать готовое Action (плагин).
        # actions/checkout@v4 — официальный плагин от GitHub.
        # Он делает git clone твоего репозитория на виртуальную машину.
        # БЕЗ этого шага — на машине нет моего кода вообще.

      # Установка Python
      - name: Set up Python
        uses: actions/setup-python@v5
        # Ещё один официальный плагин — устанавливает Python.
        # На чистой Ubuntu Python может быть устаревшей версии,
        # поэтому явно указываем нужную.
        with:
          python-version: '3.11'
          # with — это параметры для плагина.
          # Указываем конкретную версию Python чтобы поведение
          # было предсказуемым и одинаковым при каждом запуске.

      # Установка зависимостей
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # pip — менеджер пакетов Python (как магазин приложений).
          # Сначала обновляем сам pip до последней версии,
          # чтобы не было проблем с установкой пакетов.

          pip install pytest
          # pytest — библиотека для запуска тестов.
          # Она ищет файлы test_*.py и функции test_* внутри них,
          # запускает их и показывает что прошло, а что упало.

      # Запуск тестов - главный шаг — ради него всё и затевалось
      - name: Run unit tests
        run: pytest test_calculator.py -v
        # pytest запускает все тесты из test_calculator.py
        # Флаг -v (verbose) — подробный режим:
        #   PASSED = тест прошёл ✅
        #   FAILED = тест упал ❌ (CI покрасится в красный)
        # Если хоть один тест FAILED — весь job считается провалившимся,
        # PR нельзя будет смержить в main.

      # Вывод информации об окружении
      # Полезно для отладки — видно что именно запустилось
      - name: Print environment info
        run: |
          echo "ИНФОРМАЦИЯ ОБ ОКРУЖЕНИИ"
          echo "Ветка: $GITHUB_REF_NAME"
          # GITHUB_REF_NAME — встроенная переменная GitHub Actions,
          # содержит имя текущей ветки (main / development / release)

          echo "Коммит: $GITHUB_SHA"
          # GITHUB_SHA — хэш коммита который запустил этот pipeline.
          # Так можно точно знать какой именно код был протестирован.

          echo "Репозиторий: $GITHUB_REPOSITORY"
          # Имя репозитория в формате username/repo-name

          echo "Запустил: $GITHUB_ACTOR"
          # Имя пользователя GitHub который сделал push/PR

          echo "Время запуска: $(date)"
          # Текущее время на виртуальной машине

          echo "Версия Python: $(python --version)"
          # Подтверждаем что нужная версия Python установлена

          echo "Версия pytest: $(pytest --version)"
          # Версия pytest которая будет запускать тесты


      # Генерация HTML документации из кода
      - name: Generate HTML documentation
        run: |
          pip install pdoc
          mkdir -p docs
          pdoc calculator.py --output-dir docs
          echo "HTML документация сгенерирована в папке docs/"
          ls -la docs/
